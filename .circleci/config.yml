version: 2.1

executors:
  node:
    docker:
      - image: cimg/node:24.14
    working_directory: ~/project
  playwright:
    docker:
      - image: mcr.microsoft.com/playwright:v1.59.1-noble
    working_directory: ~/project

commands:
  attach_project_workspace:
    steps:
      - attach_workspace:
          at: ~/

  require_vercel_environment:
    steps:
      - run:
          name: Check Vercel environment variables
          command: |
            missing=0

            for name in VERCEL_TOKEN VERCEL_ORG_ID VERCEL_PROJECT_ID; do
              if [ -z "${!name:-}" ]; then
                echo "Missing required environment variable: ${name}"
                missing=1
              fi
            done

            exit "${missing}"

  require_vercel_automation_bypass:
    steps:
      - run:
          name: Check Vercel automation bypass secret
          command: |
            trimmed_secret="$(printf "%s" "${VERCEL_AUTOMATION_BYPASS_SECRET:-}" | tr -d '[:space:]')"

            if [ -z "${trimmed_secret}" ]; then
              echo "Missing required environment variable: VERCEL_AUTOMATION_BYPASS_SECRET"
              echo "Create a Vercel Protection Bypass for Automation secret and add it to CircleCI for deployed E2E tests."
              exit 1
            fi

  deploy_to_vercel:
    parameters:
      environment:
        type: enum
        enum:
          - preview
          - production
      production_flag:
        type: string
        default: ""
    steps:
      - require_vercel_environment
      - run:
          name: Configure Vercel CLI version
          environment:
            VERCEL_CLI_VERSION: 53.0.1
          command: printf "export VERCEL_CLI_VERSION=%q\n" "${VERCEL_CLI_VERSION}" >> "$BASH_ENV"
      - run:
          name: Pull Vercel environment
          command: npx --yes "vercel@${VERCEL_CLI_VERSION}" pull --yes --environment=<< parameters.environment >> --token="$VERCEL_TOKEN"
      - run:
          name: Build Vercel output
          command: npx --yes "vercel@${VERCEL_CLI_VERSION}" build << parameters.production_flag >> --token="$VERCEL_TOKEN"
      - run:
          name: Deploy Vercel output
          command: |
            deploy_output="$(npx --yes "vercel@${VERCEL_CLI_VERSION}" deploy --prebuilt --archive=tgz << parameters.production_flag >> --token="$VERCEL_TOKEN")"
            deployment_url="$(printf "%s\n" "${deploy_output}" | grep -Eo 'https://[^[:space:]]+' | tail -n 1 || true)"

            if [ -z "${deployment_url}" ]; then
              echo "Failed to parse deployment URL from 'vercel deploy' output" >&2
              printf "%s\n" "${deploy_output}" >&2
              exit 1
            fi

            printf "%s\n" "${deployment_url}" > vercel-deployment-url
            echo "Deployed to ${deployment_url}"
      - persist_to_workspace:
          root: ~/
          paths:
            - project/vercel-deployment-url

jobs:
  install_dependencies:
    executor: node
    steps:
      - checkout
      - restore_cache:
          keys:
            - npm-cache-v1-{{ checksum "package-lock.json" }}
            - npm-cache-v1-
      - run:
          name: Install dependencies
          environment:
            PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: "1"
          command: npm ci
      - save_cache:
          key: npm-cache-v1-{{ checksum "package-lock.json" }}
          paths:
            - ~/.npm
      - persist_to_workspace:
          root: ~/
          paths:
            - project

  lint:
    executor: node
    steps:
      - attach_project_workspace
      - run:
          name: Lint
          command: npm run lint

  typecheck:
    executor: node
    steps:
      - attach_project_workspace
      - run:
          name: Typecheck
          command: npm run typecheck

  unit_tests:
    executor: node
    steps:
      - attach_project_workspace
      - run:
          name: Unit tests
          command: npm run test:run

  build:
    executor: node
    steps:
      - attach_project_workspace
      - run:
          name: Build
          command: npm run build

  deploy_preview:
    executor: node
    steps:
      - attach_project_workspace
      - deploy_to_vercel:
          environment: preview

  deploy_production:
    executor: node
    steps:
      - attach_project_workspace
      - deploy_to_vercel:
          environment: production
          production_flag: --prod

  e2e:
    executor: playwright
    steps:
      - attach_project_workspace
      - require_vercel_automation_bypass
      - run:
          name: Read deployment URL
          command: |
            deployment_url="$(cat vercel-deployment-url)"
            printf "export PLAYWRIGHT_BASE_URL=%q\n" "${deployment_url}" >> "$BASH_ENV"
            echo "Testing ${deployment_url}"
      - run:
          name: End-to-end tests
          command: npm run test:e2e:deployed
      - store_artifacts:
          path: playwright-report
      - store_artifacts:
          path: test-results
      - store_test_results:
          path: test-results

workflows:
  ci_cd:
    jobs:
      - install_dependencies
      - lint:
          requires:
            - install_dependencies
      - typecheck:
          requires:
            - install_dependencies
      - unit_tests:
          requires:
            - install_dependencies
      - build:
          requires:
            - install_dependencies
      - deploy_preview:
          requires:
            - lint
            - typecheck
            - unit_tests
            - build
          filters:
            branches:
              ignore: main
      - e2e:
          name: e2e_preview
          requires:
            - deploy_preview
          filters:
            branches:
              ignore: main
      - deploy_production:
          requires:
            - lint
            - typecheck
            - unit_tests
            - build
          filters:
            branches:
              only: main
      - e2e:
          name: e2e_production
          requires:
            - deploy_production
          filters:
            branches:
              only: main
